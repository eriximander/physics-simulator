<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>物理演算プレイグラウンド（トップダウン）</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; background: #1e1e1e; color: #ddd; overflow: hidden; }
  #app { display: flex; height: 100vh; }
  #leftpanel { width: 240px; background: #232323; border-right: 1px solid #444; overflow-y: auto; padding: 10px 10px 30px; }
  #canvas { flex: 1; background: #2a2a2a; cursor: crosshair; display: block; min-width: 300px; }
  #sidebar { width: 300px; background: #252525; padding: 14px 14px 30px; border-left: 1px solid #444; overflow-y: auto; }
  h3 { margin: 10px 0 6px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; }
  h4 { margin: 8px 0 4px; font-size: 11px; color: #7ab; text-transform: uppercase; letter-spacing: 1px; }
  .tools { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .tool { padding: 8px 6px; background: #333; border: 1px solid #444; color: #ddd; cursor: pointer; border-radius: 3px; font-size: 12px; text-align: center; }
  .tool.active { background: #4a7fb8; border-color: #6a9fd8; color: #fff; }
  .tool:hover:not(.active) { background: #3a3a3a; }
  .row { display: flex; align-items: center; gap: 6px; margin: 5px 0; font-size: 12px; }
  .row label { flex: 1; color: #aaa; }
  input[type=number], input[type=text], select { width: 100px; background: #1a1a1a; border: 1px solid #444; color: #ddd; padding: 4px 6px; border-radius: 3px; font-size: 12px; }
  input[type=range] { flex: 1; }
  input[type=checkbox] { accent-color: #4a7fb8; }
  button { padding: 6px 10px; background: #333; border: 1px solid #555; color: #ddd; cursor: pointer; border-radius: 3px; font-size: 12px; }
  button:hover { background: #3e3e3e; }
  button.primary { background: #4a7fb8; border-color: #6a9fd8; color: #fff; }
  button.preset { padding: 4px 8px; font-size: 11px; }
  #hint { font-size: 11px; color: #9ab8dc; background: #2a3040; padding: 6px 8px; border-radius: 3px; margin-top: 6px; min-height: 28px; line-height: 1.5; }
  .sep { height: 1px; background: #3a3a3a; margin: 12px 0; }
  .num { width: 52px; text-align: right; color: #aaa; font-size: 11px; font-family: ui-monospace, monospace; }
  .legend { font-size: 10px; color: #777; margin-top: 10px; line-height: 1.7; }
  .legend span { display: inline-block; width: 9px; height: 9px; border-radius: 50%; vertical-align: middle; margin-right: 4px; }
  .list-section { margin-bottom: 8px; }
  .list-empty { color: #666; font-size: 11px; padding: 4px 8px; font-style: italic; }
  .list-item { display: flex; align-items: center; gap: 5px; padding: 4px 6px; border-radius: 3px; cursor: pointer; margin: 1px 0; border: 1px solid transparent; }
  .list-item:hover { background: #2e2e2e; }
  .list-item.selected { background: #34547a; border-color: #6a9fd8; }
  .list-item .icon { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .list-item input[type=text] { flex: 1; width: auto; background: transparent; border: 1px solid transparent; color: #ddd; padding: 2px 4px; font-size: 12px; border-radius: 2px; }
  .list-item input[type=text]:focus { background: #1a1a1a; border-color: #555; outline: none; }
  .list-item .meta { font-size: 10px; color: #888; font-family: ui-monospace, monospace; white-space: nowrap; }
  .list-item .del { color: #777; background: transparent; border: none; padding: 0 4px; font-size: 14px; cursor: pointer; line-height: 1; }
  .list-item .del:hover { color: #f88; }
  .list-header { display: flex; align-items: baseline; justify-content: space-between; padding: 0 4px; }
  .list-header .count { color: #666; font-size: 10px; font-family: ui-monospace, monospace; }
  .subbox { border: 1px solid #3a3a3a; border-radius: 4px; padding: 8px; margin-top: 8px; background: #1e1e1e; }
  .subbox h5 { margin: 0 0 6px; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div id="app">
  <div id="leftpanel">
    <h3>要素一覧</h3>
    <div id="list"></div>
    <div class="legend">
      <div><span style="background:#82d982"></span>自由 / <span style="background:#ff6b6b"></span>固定 / <span style="background:#ffaa55"></span>回転中心 / <span style="background:#ffd166"></span>駆動 / <span style="background:#7acef0"></span>スライダー</div>
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <div id="sidebar">
    <h3>ツール</h3>
    <div class="tools">
      <button class="tool" data-tool="rod">ロッド</button>
      <button class="tool" data-tool="pin">ピン(固定)</button>
      <button class="tool" data-tool="motor">回転ジョイント</button>
      <button class="tool" data-tool="slider">スライダー</button>
      <button class="tool" data-tool="coincidence">一致拘束</button>
      <button class="tool" data-tool="drag">ドラッグ</button>
      <button class="tool" data-tool="select">選択</button>
      <button class="tool" data-tool="delete">削除</button>
    </div>
    <div id="hint"></div>

    <div class="sep"></div>
    <h3>スナップ / 表示</h3>
    <div class="row"><label>格子スナップ</label><input type="checkbox" id="snapGrid" checked></div>
    <div class="row"><label>角度スナップ</label><input type="checkbox" id="snapAngle" checked></div>
    <div class="row"><label>座標軸表示</label><input type="checkbox" id="showAxes" checked></div>
    <div class="row"><label>格子サイズ</label><input type="number" id="gridSize" value="40" step="10" min="10" max="200"></div>

    <div class="sep"></div>
    <h3>シミュレーション</h3>
    <div class="row">
      <button id="playBtn" class="primary">▶ 再生</button>
      <button id="stepBtn">1ステップ</button>
    </div>
    <div class="row"><label>重力</label><input type="range" id="gravity" min="0" max="2" step="0.05" value="0"><span class="num" id="gravityVal"></span></div>
    <div class="row"><label>減衰</label><input type="range" id="damp" min="0.9" max="1" step="0.005" value="0.995"><span class="num" id="dampVal"></span></div>
    <div class="row"><label>反復</label><input type="range" id="iter" min="1" max="40" step="1" value="18"><span class="num" id="iterVal"></span></div>

    <div class="sep"></div>
    <h3 id="propTitle">プロパティ</h3>
    <div id="props"><div style="color:#666;font-size:12px">オブジェクトを選択してください</div></div>

    <div class="sep"></div>
    <h3>ファイル</h3>
    <div class="row">
      <button id="saveBtn">保存</button>
      <button id="loadBtn">読込</button>
      <button id="clearBtn">全削除</button>
    </div>
    <div class="row">
      <button id="mergeBtn" style="flex:1">重複点を統合</button>
    </div>
    <div class="legend">
      <div>Space: 再生/停止 · Esc: キャンセル</div>
    </div>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0;
  const resize = () => {
    const dpr = window.devicePixelRatio || 1;
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  };
  window.addEventListener('resize', resize);

  const state = {
    particles: [],
    rods: [],
    motors: [],
    sliders: [],
    angleConstraints: [],    // {name, joint, rodA, rodB, angle}  angle = target (rad), measured as atan2(B)-atan2(A) from joint
    coincidences: [],        // {name, a, b} — two particle indices welded to same position
    counters: { p: 0, r: 0, m: 0, s: 0, a: 0, c: 0 },
    tool: 'rod',
    playing: false,
    gravity: 0,
    damping: 0.995,
    iterations: 18,
    selected: null,
    pending: null,
    dragging: null,
    mouse: { x: 0, y: 0 },
    snapGrid: true,
    snapAngle: true,
    showAxes: true,
    gridSize: 40,
    originX: 0,
    originY: 0,
  };

  const SNAP_PARTICLE = 14;
  const HIT = 8;
  const SNAP_GRID_PX = 10;
  const ANGLE_SNAP_RAD = 7 * Math.PI / 180;
  const ANGLE_SNAPS = [0, 45, 90, 135, 180, 225, 270, 315].map(d => d * Math.PI / 180);
  const FPS = 60;
  const radPerStepToDegPerSec = v => v * FPS * 180 / Math.PI;
  const degPerSecToRadPerStep = v => v * Math.PI / (180 * FPS);

  const addParticle = (x, y, pinned = false) => {
    const name = `P${++state.counters.p}`;
    state.particles.push({ name, x, y, px: x, py: y, pinned, driven: false });
    return state.particles.length - 1;
  };
  const isMotorCenter = i => state.motors.some(m => m.center === i);
  const isSliderPart = i => state.sliders.some(s => s.particle === i);
  const rodsThrough = idx => {
    const arr = [];
    state.rods.forEach((r, i) => { if (r.a === idx || r.b === idx) arr.push(i); });
    return arr;
  };
  const getParticleAt = (x, y, r = SNAP_PARTICLE, excludeIdx = -1) => {
    let best = -1, bestD2 = r * r;
    for (let i = 0; i < state.particles.length; i++) {
      if (i === excludeIdx) continue;
      const p = state.particles[i];
      const dx = p.x - x, dy = p.y - y, d2 = dx*dx + dy*dy;
      if (d2 < bestD2) { bestD2 = d2; best = i; }
    }
    return best;
  };
  const distPointSeg = (x, y, ax, ay, bx, by) => {
    const vx = bx - ax, vy = by - ay;
    const wx = x - ax, wy = y - ay;
    const len2 = vx*vx + vy*vy;
    let t = len2 > 0 ? (vx*wx + vy*wy) / len2 : 0;
    t = Math.max(0, Math.min(1, t));
    const px = ax + t*vx, py = ay + t*vy;
    return { d: Math.hypot(x - px, y - py), t };
  };
  const getRodAt = (x, y, r = HIT) => {
    let best = -1, bestD = r;
    for (let i = 0; i < state.rods.length; i++) {
      const rod = state.rods[i];
      const a = state.particles[rod.a], b = state.particles[rod.b];
      const { d } = distPointSeg(x, y, a.x, a.y, b.x, b.y);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  };
  const getSliderAt = (x, y, r = HIT) => {
    let best = -1, bestD = r;
    for (let i = 0; i < state.sliders.length; i++) {
      const s = state.sliders[i];
      const a = state.particles[s.a], b = state.particles[s.b];
      const { d } = distPointSeg(x, y, a.x, a.y, b.x, b.y);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  };
  const findMotorByParticle = idx => {
    for (let i = 0; i < state.motors.length; i++) {
      if (state.motors[i].center === idx || state.motors[i].driven === idx) return i;
    }
    return -1;
  };

  // ========= SNAP =========
  const MERGE_EPS = 6;  // if snapped position is within this of an existing particle, reuse it
  function snapPos(mx, my, from, excludeIdx = -1) {
    // 1) existing particle at raw cursor
    let pIdx = getParticleAt(mx, my, SNAP_PARTICLE, excludeIdx);
    if (pIdx >= 0) {
      const p = state.particles[pIdx];
      return { x: p.x, y: p.y, particleIdx: pIdx, type: 'particle' };
    }
    // 2) angle snap (relative to `from`)
    let sx = mx, sy = my, type = 'free';
    if (from && state.snapAngle) {
      const dx = mx - from.x, dy = my - from.y;
      const len = Math.hypot(dx, dy);
      if (len > 5) {
        const ang = Math.atan2(dy, dx);
        let bestSa = null, bestDiff = ANGLE_SNAP_RAD;
        for (const sa of ANGLE_SNAPS) {
          let diff = ang - sa;
          while (diff > Math.PI) diff -= 2 * Math.PI;
          while (diff < -Math.PI) diff += 2 * Math.PI;
          if (Math.abs(diff) < bestDiff) { bestDiff = Math.abs(diff); bestSa = sa; }
        }
        if (bestSa !== null) {
          sx = from.x + len * Math.cos(bestSa);
          sy = from.y + len * Math.sin(bestSa);
          type = 'angle';
        }
      }
    }
    // 3) grid snap on top
    if (state.snapGrid) {
      const G = state.gridSize, ox = state.originX, oy = state.originY;
      const gx = Math.round((sx - ox) / G) * G + ox;
      const gy = Math.round((sy - oy) / G) * G + oy;
      let hx = false, hy = false;
      if (Math.abs(sx - gx) < SNAP_GRID_PX) { sx = gx; hx = true; }
      if (Math.abs(sy - gy) < SNAP_GRID_PX) { sy = gy; hy = true; }
      if (hx || hy) type = type === 'angle' ? 'angle+grid' : 'grid';
    }
    // 4) FINAL — after snapping, if we landed on (or very near) an existing particle, reuse it
    // This prevents duplicate particles when grid-snap lands on an existing particle's grid point
    pIdx = getParticleAt(sx, sy, Math.max(SNAP_PARTICLE, MERGE_EPS), excludeIdx);
    if (pIdx >= 0) {
      const p = state.particles[pIdx];
      return { x: p.x, y: p.y, particleIdx: pIdx, type: 'particle' };
    }
    return { x: sx, y: sy, particleIdx: -1, type };
  }

  // ========= DELETE / REINDEX =========
  function reindexAfterRemoveParticle(removedIdx) {
    const shift = i => i > removedIdx ? i - 1 : i;
    // compute which rods will be removed
    const removedRodSet = new Set();
    state.rods.forEach((r, i) => { if (r.a === removedIdx || r.b === removedIdx) removedRodSet.add(i); });
    const removedRodsSorted = [...removedRodSet].sort((a, b) => a - b);
    const shiftRodIdx = ri => {
      let s = 0;
      for (const r of removedRodsSorted) if (r < ri) s++;
      return ri - s;
    };
    // angle constraints
    state.angleConstraints = state.angleConstraints
      .filter(ac => ac.joint !== removedIdx && !removedRodSet.has(ac.rodA) && !removedRodSet.has(ac.rodB))
      .map(ac => ({ ...ac, joint: shift(ac.joint), rodA: shiftRodIdx(ac.rodA), rodB: shiftRodIdx(ac.rodB) }));
    // rods
    state.rods = state.rods
      .filter(r => r.a !== removedIdx && r.b !== removedIdx)
      .map(r => ({ ...r, a: shift(r.a), b: shift(r.b) }));
    // motors
    state.motors = state.motors
      .filter(m => {
        if (m.center === removedIdx || m.driven === removedIdx) {
          if (m.driven !== removedIdx && state.particles[m.driven]) state.particles[m.driven].driven = false;
          return false;
        }
        return true;
      })
      .map(m => ({ ...m, center: shift(m.center), driven: shift(m.driven) }));
    // sliders
    state.sliders = state.sliders
      .filter(s => s.particle !== removedIdx && s.a !== removedIdx && s.b !== removedIdx)
      .map(s => ({ ...s, particle: shift(s.particle), a: shift(s.a), b: shift(s.b) }));
    // coincidences
    state.coincidences = state.coincidences
      .filter(c => c.a !== removedIdx && c.b !== removedIdx)
      .map(c => ({ ...c, a: shift(c.a), b: shift(c.b) }));
  }
  const deleteParticle = idx => { reindexAfterRemoveParticle(idx); state.particles.splice(idx, 1); state.selected = null; };
  const deleteRod = idx => {
    state.angleConstraints = state.angleConstraints
      .filter(ac => ac.rodA !== idx && ac.rodB !== idx)
      .map(ac => ({ ...ac, rodA: ac.rodA > idx ? ac.rodA - 1 : ac.rodA, rodB: ac.rodB > idx ? ac.rodB - 1 : ac.rodB }));
    state.rods.splice(idx, 1); state.selected = null;
  };
  const deleteMotor = idx => {
    const m = state.motors[idx];
    if (state.particles[m.driven]) state.particles[m.driven].driven = false;
    state.motors.splice(idx, 1); state.selected = null;
  };
  const deleteSlider = idx => { state.sliders.splice(idx, 1); state.selected = null; };
  const deleteAngleConstraint = idx => { state.angleConstraints.splice(idx, 1); state.selected = null; };
  const deleteCoincidence = idx => { state.coincidences.splice(idx, 1); state.selected = null; };
  const deleteItem = (type, idx) => {
    if (type === 'particle') deleteParticle(idx);
    else if (type === 'rod') deleteRod(idx);
    else if (type === 'motor') deleteMotor(idx);
    else if (type === 'slider') deleteSlider(idx);
    else if (type === 'angle') deleteAngleConstraint(idx);
    else if (type === 'coincidence') deleteCoincidence(idx);
    renderList(); updateProps();
  };

  // ========= PHYSICS =========
  function applyAngleConstraint(ac) {
    const rodA = state.rods[ac.rodA], rodB = state.rods[ac.rodB];
    if (!rodA || !rodB) return;
    const J = state.particles[ac.joint]; if (!J) return;
    let aIdx = rodA.a === ac.joint ? rodA.b : (rodA.b === ac.joint ? rodA.a : -1);
    let bIdx = rodB.a === ac.joint ? rodB.b : (rodB.b === ac.joint ? rodB.a : -1);
    if (aIdx < 0 || bIdx < 0 || aIdx === bIdx) return;
    const A = state.particles[aIdx], B = state.particles[bIdx];
    const angA = Math.atan2(A.y - J.y, A.x - J.x);
    const angB = Math.atan2(B.y - J.y, B.x - J.x);
    let err = ac.angle - (angB - angA);
    while (err > Math.PI) err -= 2 * Math.PI;
    while (err < -Math.PI) err += 2 * Math.PI;
    const fA = (A.pinned || A.driven) ? 0 : 1;
    const fB = (B.pinned || B.driven) ? 0 : 1;
    const total = fA + fB;
    if (total === 0) return;
    const rotA = -err * fA / total;
    const rotB = err * fB / total;
    if (fA > 0) {
      const vx = A.x - J.x, vy = A.y - J.y;
      const c = Math.cos(rotA), s = Math.sin(rotA);
      A.x = J.x + vx * c - vy * s;
      A.y = J.y + vx * s + vy * c;
    }
    if (fB > 0) {
      const vx = B.x - J.x, vy = B.y - J.y;
      const c = Math.cos(rotB), s = Math.sin(rotB);
      B.x = J.x + vx * c - vy * s;
      B.y = J.y + vx * s + vy * c;
    }
  }
  function step() {
    for (const m of state.motors) {
      m.angle += m.omega;
      const c = state.particles[m.center];
      const d = state.particles[m.driven];
      d.px = d.x; d.py = d.y;
      d.x = c.x + m.radius * Math.cos(m.angle);
      d.y = c.y + m.radius * Math.sin(m.angle);
    }
    const g = state.gravity, damp = state.damping;
    for (const p of state.particles) {
      if (p.pinned || p.driven) continue;
      const vx = (p.x - p.px) * damp;
      const vy = (p.y - p.py) * damp;
      p.px = p.x; p.py = p.y;
      p.x += vx;
      p.y += vy + g;
    }
    for (let it = 0; it < state.iterations; it++) {
      for (const rod of state.rods) {
        const a = state.particles[rod.a], b = state.particles[rod.b];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = Math.sqrt(dx*dx + dy*dy) || 1e-5;
        const diff = (d - rod.length) / d;
        const mA = (a.pinned || a.driven) ? 0 : 1;
        const mB = (b.pinned || b.driven) ? 0 : 1;
        const total = mA + mB;
        if (total === 0) continue;
        const px = dx * diff, py = dy * diff;
        a.x += px * (mA / total); a.y += py * (mA / total);
        b.x -= px * (mB / total); b.y -= py * (mB / total);
      }
      for (const cc of state.coincidences) {
        const a = state.particles[cc.a], b = state.particles[cc.b];
        const mA = (a.pinned || a.driven) ? 0 : 1;
        const mB = (b.pinned || b.driven) ? 0 : 1;
        const total = mA + mB;
        if (total === 0) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        a.x += dx * (mA / total); a.y += dy * (mA / total);
        b.x -= dx * (mB / total); b.y -= dy * (mB / total);
      }
      for (const ac of state.angleConstraints) applyAngleConstraint(ac);
      for (const s of state.sliders) {
        const p = state.particles[s.particle];
        if (p.pinned || p.driven) continue;
        const a = state.particles[s.a], b = state.particles[s.b];
        const { t } = distPointSeg(p.x, p.y, a.x, a.y, b.x, b.y);
        p.x = a.x + t * (b.x - a.x);
        p.y = a.y + t * (b.y - a.y);
      }
    }
  }

  // ========= RENDER =========
  function render() {
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, 0, W, H);
    // grid
    const G = state.gridSize, ox = state.originX, oy = state.originY;
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    const firstX = ox - Math.floor(ox / G) * G;
    for (let x = firstX; x < W; x += G) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    const firstY = oy - Math.floor(oy / G) * G;
    for (let y = firstY; y < H; y += G) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();
    // axes
    if (state.showAxes) {
      ctx.strokeStyle = '#5a6a78';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, oy); ctx.lineTo(W, oy);
      ctx.moveTo(ox, 0); ctx.lineTo(ox, H);
      ctx.stroke();
      ctx.fillStyle = '#8a9aaa';
      ctx.font = '10px ui-monospace, monospace';
      ctx.fillText('O', ox + 4, oy - 4);
      ctx.fillText('X', W - 12, oy - 4);
      ctx.fillText('Y', ox + 4, 10);
      // tick labels every 2*G
      const step = G * 2;
      for (let x = ox + step; x < W; x += step) ctx.fillText(Math.round(x - ox).toString(), x + 2, oy + 12);
      for (let x = ox - step; x > 0; x -= step) ctx.fillText(Math.round(x - ox).toString(), x + 2, oy + 12);
      for (let y = oy - step; y > 0; y -= step) ctx.fillText(Math.round(oy - y).toString(), ox + 4, y);
      for (let y = oy + step; y < H; y += step) ctx.fillText(Math.round(oy - y).toString(), ox + 4, y);
    }

    // slider rails
    for (let i = 0; i < state.sliders.length; i++) {
      const s = state.sliders[i];
      const a = state.particles[s.a], b = state.particles[s.b];
      const sel = state.selected && state.selected.type === 'slider' && state.selected.index === i;
      ctx.strokeStyle = sel ? '#7acef0' : '#4a7a90';
      ctx.lineWidth = sel ? 5 : 3;
      ctx.setLineDash([8, 4]);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.stroke();
      ctx.setLineDash([]);
      const drawStop = (px, py, dx, dy) => {
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len * 8, ny = dx / len * 8;
        ctx.beginPath();
        ctx.moveTo(px - nx, py - ny); ctx.lineTo(px + nx, py + ny); ctx.stroke();
      };
      ctx.strokeStyle = sel ? '#7acef0' : '#4a7a90';
      ctx.lineWidth = sel ? 4 : 2;
      drawStop(a.x, a.y, b.x - a.x, b.y - a.y);
      drawStop(b.x, b.y, b.x - a.x, b.y - a.y);
    }

    // motors
    for (let i = 0; i < state.motors.length; i++) {
      const m = state.motors[i];
      const c = state.particles[m.center];
      const sel = state.selected && state.selected.type === 'motor' && state.selected.index === i;
      ctx.strokeStyle = sel ? '#ffaa55' : '#8b6a3a';
      ctx.lineWidth = sel ? 2 : 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.arc(c.x, c.y, m.radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle = '#ffaa55';
      ctx.lineWidth = 2;
      const dir = Math.sign(m.omega) || 1;
      const start = m.angle, end = m.angle + dir * 0.6;
      ctx.beginPath();
      ctx.arc(c.x, c.y, m.radius + 10, start, end, dir < 0);
      ctx.stroke();
      const tipX = c.x + (m.radius + 10) * Math.cos(end);
      const tipY = c.y + (m.radius + 10) * Math.sin(end);
      const tangent = end + dir * Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX - 7 * Math.cos(tangent - dir * 0.5), tipY - 7 * Math.sin(tangent - dir * 0.5));
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX - 7 * Math.cos(tangent + dir * 0.5), tipY - 7 * Math.sin(tangent + dir * 0.5));
      ctx.stroke();
    }

    // rods
    for (let i = 0; i < state.rods.length; i++) {
      const rod = state.rods[i];
      const a = state.particles[rod.a], b = state.particles[rod.b];
      const sel = state.selected && state.selected.type === 'rod' && state.selected.index === i;
      ctx.strokeStyle = sel ? '#ffcb6b' : '#c0d0e0';
      ctx.lineWidth = sel ? 4 : 3;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.stroke();
      if (sel) {
        const mx = (a.x + b.x)/2, my = (a.y + b.y)/2;
        const len = Math.hypot(b.x - a.x, b.y - a.y);
        ctx.fillStyle = '#ffcb6b';
        ctx.font = '11px ui-monospace, monospace';
        ctx.fillText(`${rod.name} (${len.toFixed(1)})`, mx + 8, my - 8);
      }
    }

    // angle constraints
    for (let i = 0; i < state.angleConstraints.length; i++) {
      const ac = state.angleConstraints[i];
      const rodA = state.rods[ac.rodA], rodB = state.rods[ac.rodB];
      if (!rodA || !rodB) continue;
      const J = state.particles[ac.joint];
      const aIdx = rodA.a === ac.joint ? rodA.b : rodA.a;
      const bIdx = rodB.a === ac.joint ? rodB.b : rodB.a;
      const A = state.particles[aIdx], B = state.particles[bIdx];
      const angA = Math.atan2(A.y - J.y, A.x - J.x);
      const angB = Math.atan2(B.y - J.y, B.x - J.x);
      const sel = state.selected && state.selected.type === 'angle' && state.selected.index === i;
      ctx.strokeStyle = sel ? '#e892ff' : '#a56bc4';
      ctx.fillStyle = sel ? 'rgba(232,146,255,0.2)' : 'rgba(165,107,196,0.15)';
      ctx.lineWidth = sel ? 2 : 1.5;
      const arcR = 22;
      ctx.beginPath();
      ctx.moveTo(J.x, J.y);
      ctx.arc(J.x, J.y, arcR, angA, angB, angB < angA);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      const midAng = (angA + angB) / 2 + (angB < angA ? Math.PI : 0);
      ctx.fillStyle = sel ? '#e892ff' : '#c9a0dc';
      ctx.font = '10px ui-monospace, monospace';
      const lbl = `${(ac.angle * 180 / Math.PI).toFixed(0)}°`;
      ctx.fillText(lbl, J.x + (arcR + 4) * Math.cos(midAng), J.y + (arcR + 4) * Math.sin(midAng));
    }

    // coincidence markers
    for (let i = 0; i < state.coincidences.length; i++) {
      const cc = state.coincidences[i];
      const a = state.particles[cc.a], b = state.particles[cc.b];
      if (!a || !b) continue;
      const sel = state.selected && state.selected.type === 'coincidence' && state.selected.index === i;
      const mx2 = (a.x + b.x) / 2, my2 = (a.y + b.y) / 2;
      const d = Math.hypot(b.x - a.x, b.y - a.y);
      if (d > 1) {
        ctx.strokeStyle = sel ? '#5de2a3' : '#2d9c6f';
        ctx.setLineDash([2, 3]);
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.fillStyle = sel ? '#5de2a3' : '#2d9c6f';
      ctx.beginPath(); ctx.arc(mx2, my2, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px ui-monospace, monospace';
      ctx.fillText('=', mx2 - 3, my2 + 3);
    }

    // particles
    for (let i = 0; i < state.particles.length; i++) {
      const p = state.particles[i];
      const sel = state.selected && state.selected.type === 'particle' && state.selected.index === i;
      const color = particleColor(i);
      const radius = (p.pinned || isMotorCenter(i)) ? 7 : 5.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      if (p.pinned || isMotorCenter(i)) {
        ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 2; ctx.stroke();
      }
      if (sel) {
        ctx.strokeStyle = '#ffcb6b'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 11, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = '#ffcb6b';
        ctx.font = '11px ui-monospace, monospace';
        ctx.fillText(p.name, p.x + 12, p.y - 10);
      }
    }

    // pending + snap preview
    const from = state.pending ? { x: state.pending.x, y: state.pending.y } : null;
    const snap = snapPos(state.mouse.x, state.mouse.y, from);
    if (state.pending) {
      ctx.strokeStyle = state.pending.tool === 'motor' ? '#ffaa55' : state.pending.tool === 'slider' ? '#7acef0' : '#6a9fd8';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(state.pending.x, state.pending.y);
      ctx.lineTo(snap.x, snap.y);
      ctx.stroke();
      ctx.setLineDash([]);
      const d = Math.hypot(snap.x - state.pending.x, snap.y - state.pending.y);
      const ang = Math.atan2(snap.y - state.pending.y, snap.x - state.pending.x) * 180 / Math.PI;
      ctx.fillStyle = '#9ab8dc';
      ctx.font = '12px ui-monospace, monospace';
      ctx.fillText(`${d.toFixed(0)}  ∠${ang.toFixed(0)}°`, (state.pending.x + snap.x)/2 + 8, (state.pending.y + snap.y)/2 - 6);
    }
    // snap marker at cursor
    if (snap.type !== 'free' && snap.type !== 'particle') {
      ctx.strokeStyle = '#ffee88';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(snap.x - 6, snap.y); ctx.lineTo(snap.x + 6, snap.y);
      ctx.moveTo(snap.x, snap.y - 6); ctx.lineTo(snap.x, snap.y + 6);
      ctx.stroke();
      if (snap.type.includes('angle') && from) {
        const ang = Math.round(Math.atan2(snap.y - from.y, snap.x - from.x) * 180 / Math.PI);
        ctx.fillStyle = '#ffee88';
        ctx.font = '10px ui-monospace, monospace';
        ctx.fillText(`${ang}°`, snap.x + 10, snap.y - 10);
      }
    }
    if (snap.particleIdx >= 0) {
      const p = state.particles[snap.particleIdx];
      ctx.strokeStyle = '#ffee88';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 11, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  function particleColor(i) {
    const p = state.particles[i];
    if (isMotorCenter(i)) return '#ffaa55';
    if (p.pinned) return '#ff6b6b';
    if (p.driven) return '#ffd166';
    if (isSliderPart(i)) return '#7acef0';
    return '#82d982';
  }

  function loop() { if (state.playing) step(); render(); requestAnimationFrame(loop); }

  // ========= INPUT =========
  canvas.addEventListener('mousemove', (e) => {
    const r = canvas.getBoundingClientRect();
    state.mouse.x = e.clientX - r.left;
    state.mouse.y = e.clientY - r.top;
    if (state.dragging !== null) {
      const p = state.particles[state.dragging];
      if (!p.driven) {
        const s = snapPos(state.mouse.x, state.mouse.y, null, state.dragging);
        p.x = s.x; p.y = s.y; p.px = p.x; p.py = p.y;
      }
    }
  });
  canvas.addEventListener('mousedown', () => {
    const from = state.pending ? { x: state.pending.x, y: state.pending.y } : null;
    const snap = snapPos(state.mouse.x, state.mouse.y, from);
    const mx = snap.x, my = snap.y;
    const snappedIdx = snap.particleIdx;
    const tool = state.tool;
    if (tool === 'rod') {
      let idx = snappedIdx >= 0 ? snappedIdx : addParticle(mx, my);
      if (state.pending == null) {
        state.pending = { tool, pIdx: idx, x: state.particles[idx].x, y: state.particles[idx].y };
      } else {
        let bIdx = snappedIdx >= 0 ? snappedIdx : addParticle(mx, my);
        if (bIdx !== state.pending.pIdx) {
          const a = state.particles[state.pending.pIdx], b = state.particles[bIdx];
          state.rods.push({ name: `R${++state.counters.r}`, a: state.pending.pIdx, b: bIdx, length: Math.hypot(b.x - a.x, b.y - a.y) });
        }
        state.pending = null;
        renderList();
      }
    } else if (tool === 'pin') {
      const idx = snappedIdx >= 0 ? snappedIdx : -1;
      if (idx >= 0) {
        const p = state.particles[idx];
        if (p.driven) { alert('駆動中の点はピン固定できません'); return; }
        p.pinned = !p.pinned;
        p.px = p.x; p.py = p.y;
        renderList();
      }
    } else if (tool === 'motor') {
      let idx = snappedIdx >= 0 ? snappedIdx : addParticle(mx, my);
      if (state.pending == null) {
        const p = state.particles[idx];
        if (p.driven) { alert('駆動点は中心にできません'); return; }
        p.pinned = true; p.px = p.x; p.py = p.y;
        state.pending = { tool, pIdx: idx, x: p.x, y: p.y };
      } else {
        let dIdx = snappedIdx >= 0 ? snappedIdx : addParticle(mx, my);
        if (dIdx === state.pending.pIdx) { state.pending = null; return; }
        const d = state.particles[dIdx];
        if (d.driven) { alert('この点は既に駆動されています'); state.pending = null; return; }
        if (d.pinned) { alert('固定点は駆動できません'); state.pending = null; return; }
        const c = state.particles[state.pending.pIdx];
        const dx = d.x - c.x, dy = d.y - c.y;
        const r = Math.hypot(dx, dy) || 1;
        d.driven = true;
        state.motors.push({ name: `M${++state.counters.m}`, center: state.pending.pIdx, driven: dIdx, radius: r, angle: Math.atan2(dy, dx), omega: 0.03 });
        state.rods.push({ name: `R${++state.counters.r}`, a: state.pending.pIdx, b: dIdx, length: r });
        state.pending = null;
        renderList();
      }
    } else if (tool === 'slider') {
      let idx = snappedIdx >= 0 ? snappedIdx : -1;
      const st = state.pending ? state.pending.step : 0;
      if (st === 0) {
        if (idx < 0) idx = addParticle(mx, my);
        const p = state.particles[idx];
        if (p.driven || p.pinned) { alert('駆動/固定点はスライダー駆動点にできません'); return; }
        if (isSliderPart(idx)) { alert('この点は既にスライダーに属しています'); return; }
        state.pending = { tool, step: 1, pIdx: idx, x: p.x, y: p.y };
      } else if (st === 1) {
        if (idx < 0) idx = addParticle(mx, my, true);
        if (idx === state.pending.pIdx) { alert('駆動点と端点は同じにできません'); return; }
        state.pending = { tool, step: 2, pIdx: state.pending.pIdx, aIdx: idx, x: state.particles[idx].x, y: state.particles[idx].y };
      } else if (st === 2) {
        if (idx < 0) idx = addParticle(mx, my, true);
        if (idx === state.pending.aIdx || idx === state.pending.pIdx) { alert('異なる点を選んでください'); return; }
        const pIdx = state.pending.pIdx, aIdx = state.pending.aIdx, bIdx = idx;
        state.sliders.push({ name: `S${++state.counters.s}`, particle: pIdx, a: aIdx, b: bIdx });
        const p = state.particles[pIdx], a = state.particles[aIdx], b = state.particles[bIdx];
        const { t } = distPointSeg(p.x, p.y, a.x, a.y, b.x, b.y);
        p.x = a.x + t * (b.x - a.x); p.y = a.y + t * (b.y - a.y);
        p.px = p.x; p.py = p.y;
        state.pending = null;
        renderList();
      }
    } else if (tool === 'coincidence') {
      if (snappedIdx < 0) { alert('既存の点をクリックしてください'); return; }
      if (state.pending == null) {
        state.pending = { tool, pIdx: snappedIdx, x: state.particles[snappedIdx].x, y: state.particles[snappedIdx].y };
      } else {
        if (snappedIdx === state.pending.pIdx) { alert('異なる2点を選んでください'); state.pending = null; return; }
        const aIdx = state.pending.pIdx, bIdx = snappedIdx;
        // Reject if both are pinned/driven (over-constrained, no effect possible)
        const a = state.particles[aIdx], b = state.particles[bIdx];
        if ((a.pinned || a.driven) && (b.pinned || b.driven)) {
          alert('両方が固定/駆動点だと一致拘束は動作しません。片方は自由点にしてください。');
          state.pending = null; return;
        }
        // Reject duplicate
        if (state.coincidences.some(c => (c.a === aIdx && c.b === bIdx) || (c.a === bIdx && c.b === aIdx))) {
          alert('この2点は既に一致拘束で結ばれています'); state.pending = null; return;
        }
        state.coincidences.push({ name: `C${++state.counters.c}`, a: aIdx, b: bIdx });
        // Snap initial position: move free one to fixed one, or midpoint if both free
        const mA = (a.pinned || a.driven) ? 0 : 1, mB = (b.pinned || b.driven) ? 0 : 1;
        if (mA === 0 && mB === 1) { b.x = a.x; b.y = a.y; b.px = b.x; b.py = b.y; }
        else if (mB === 0 && mA === 1) { a.x = b.x; a.y = b.y; a.px = a.x; a.py = a.y; }
        else { const mx2 = (a.x + b.x) / 2, my2 = (a.y + b.y) / 2; a.x = b.x = mx2; a.y = b.y = my2; a.px = a.x; a.py = a.y; b.px = b.x; b.py = b.y; }
        state.pending = null;
        renderList();
      }
    } else if (tool === 'drag') {
      if (snappedIdx >= 0) state.dragging = snappedIdx;
    } else if (tool === 'select') {
      if (snappedIdx >= 0) {
        const mIdx = findMotorByParticle(snappedIdx);
        state.selected = mIdx >= 0 ? { type: 'motor', index: mIdx } : { type: 'particle', index: snappedIdx };
      } else {
        const rIdx = getRodAt(state.mouse.x, state.mouse.y);
        if (rIdx >= 0) state.selected = { type: 'rod', index: rIdx };
        else {
          const sIdx = getSliderAt(state.mouse.x, state.mouse.y);
          state.selected = sIdx >= 0 ? { type: 'slider', index: sIdx } : null;
        }
      }
      updateProps(); renderList();
    } else if (tool === 'delete') {
      if (snappedIdx >= 0) { deleteParticle(snappedIdx); renderList(); updateProps(); return; }
      const rIdx = getRodAt(state.mouse.x, state.mouse.y);
      if (rIdx >= 0) { deleteRod(rIdx); renderList(); updateProps(); return; }
      const sIdx = getSliderAt(state.mouse.x, state.mouse.y);
      if (sIdx >= 0) { deleteSlider(sIdx); renderList(); updateProps(); }
    }
  });
  window.addEventListener('mouseup', () => { state.dragging = null; });
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') state.pending = null;
    if (e.key === ' ' && e.target.tagName !== 'INPUT') { togglePlay(); e.preventDefault(); }
  });

  // ========= TOOLS =========
  const hintText = t => ({
    rod: '2点クリックでロッド作成。角度/格子/粒子にスナップ補正。',
    pin: '点をクリックで固定⇄解除。',
    motor: '中心→腕の先端の順にクリックで回転ジョイント作成。',
    slider: '駆動点→端A→端Bの順に3回クリック。',
    coincidence: '2つの既存粒子をクリックで一致拘束（同位置に固定）。回転粒子に他のチェーンを繋ぐ時に使用。',
    drag: '点をドラッグで移動。格子スナップが効きます。',
    select: 'クリックで選択。ジョイント(点)を選ぶと角度拘束の追加ができます。',
    delete: 'クリックで削除。'
  }[t] || '');
  const PLACEMENT_TOOLS = new Set(['rod', 'motor', 'slider', 'coincidence']);
  document.querySelectorAll('.tool').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.tool;
      state.tool = t;
      state.pending = null;
      document.querySelectorAll('.tool').forEach(b => b.classList.toggle('active', b === btn));
      document.getElementById('hint').textContent = hintText(t);
      if (state.playing && PLACEMENT_TOOLS.has(t)) togglePlay();
    });
  });
  document.querySelector('[data-tool=rod]').classList.add('active');
  document.getElementById('hint').textContent = hintText('rod');

  const playBtn = document.getElementById('playBtn');
  function togglePlay() {
    state.playing = !state.playing;
    playBtn.textContent = state.playing ? '■ 停止' : '▶ 再生';
    if (state.playing) for (const p of state.particles) { p.px = p.x; p.py = p.y; }
  }
  playBtn.addEventListener('click', togglePlay);
  document.getElementById('stepBtn').addEventListener('click', step);
  function bindRange(id, valId, setter, digits) {
    const el = document.getElementById(id), out = document.getElementById(valId);
    const upd = () => { out.textContent = (+el.value).toFixed(digits); setter(+el.value); };
    el.addEventListener('input', upd); upd();
  }
  bindRange('gravity', 'gravityVal', v => state.gravity = v, 2);
  bindRange('damp', 'dampVal', v => state.damping = v, 3);
  bindRange('iter', 'iterVal', v => state.iterations = v, 0);

  // snap/display controls
  document.getElementById('snapGrid').addEventListener('change', e => state.snapGrid = e.target.checked);
  document.getElementById('snapAngle').addEventListener('change', e => state.snapAngle = e.target.checked);
  document.getElementById('showAxes').addEventListener('change', e => state.showAxes = e.target.checked);
  document.getElementById('gridSize').addEventListener('input', e => { state.gridSize = Math.max(10, +e.target.value || 40); });

  // ========= LEFT PANEL =========
  function renderList() {
    const list = document.getElementById('list');
    list.innerHTML = '';
    const sections = [
      { title: '点', type: 'particle', items: state.particles, meta: i => ({
          color: particleColor(i),
          sub: state.particles[i].pinned ? 'pin' : state.particles[i].driven ? 'drv' : isMotorCenter(i) ? 'ctr' : ''
        }) },
      { title: 'リンク (ロッド)', type: 'rod', items: state.rods, meta: i => ({
          color: '#c0d0e0', sub: state.rods[i].length.toFixed(0)
        }) },
      { title: '回転ジョイント', type: 'motor', items: state.motors, meta: i => ({
          color: '#ffaa55', sub: `${radPerStepToDegPerSec(state.motors[i].omega).toFixed(0)}°/s`
        }) },
      { title: 'スライダー', type: 'slider', items: state.sliders, meta: i => {
          const s = state.sliders[i]; const a = state.particles[s.a], b = state.particles[s.b];
          return { color: '#7acef0', sub: Math.hypot(b.x - a.x, b.y - a.y).toFixed(0) };
        } },
      { title: '角度拘束', type: 'angle', items: state.angleConstraints, meta: i => ({
          color: '#c9a0dc', sub: `${(state.angleConstraints[i].angle * 180 / Math.PI).toFixed(0)}°`
        }) },
      { title: '一致拘束', type: 'coincidence', items: state.coincidences, meta: i => {
          const c = state.coincidences[i]; const a = state.particles[c.a], b = state.particles[c.b];
          return { color: '#2d9c6f', sub: a && b ? `${a.name}=${b.name}` : '' };
        } },
    ];
    for (const { title, type, items, meta } of sections) {
      const sec = document.createElement('div');
      sec.className = 'list-section';
      const header = document.createElement('div');
      header.className = 'list-header';
      header.innerHTML = `<h4>${title}</h4><span class="count">${items.length}</span>`;
      sec.appendChild(header);
      if (items.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'list-empty';
        empty.textContent = '—';
        sec.appendChild(empty);
      } else {
        items.forEach((item, i) => {
          const row = document.createElement('div');
          row.className = 'list-item';
          if (state.selected && state.selected.type === type && state.selected.index === i) row.classList.add('selected');
          const m = meta(i);
          row.innerHTML = `<div class="icon" style="background:${m.color}"></div>`;
          const nameInput = document.createElement('input');
          nameInput.type = 'text';
          nameInput.value = item.name;
          nameInput.addEventListener('click', e => e.stopPropagation());
          nameInput.addEventListener('input', e => {
            item.name = e.target.value;
            if (state.selected && state.selected.type === type && state.selected.index === i) updateProps();
          });
          row.appendChild(nameInput);
          if (m.sub) {
            const subEl = document.createElement('span');
            subEl.className = 'meta';
            subEl.textContent = m.sub;
            row.appendChild(subEl);
          }
          const del = document.createElement('button');
          del.className = 'del';
          del.textContent = '×';
          del.addEventListener('click', e => { e.stopPropagation(); deleteItem(type, i); });
          row.appendChild(del);
          row.addEventListener('click', () => {
            state.selected = { type, index: i };
            updateProps(); renderList();
          });
          sec.appendChild(row);
        });
      }
      list.appendChild(sec);
    }
  }

  // ========= PROPERTIES =========
  function nameRow(obj) {
    return `<div class="row"><label>名前</label><input type="text" id="propName" value="${obj.name}"></div>`;
  }
  function bindName(obj) {
    document.getElementById('propName').addEventListener('input', e => {
      obj.name = e.target.value; renderList();
    });
  }
  function currentAngleBetween(jIdx, rodAIdx, rodBIdx) {
    const rodA = state.rods[rodAIdx], rodB = state.rods[rodBIdx];
    const J = state.particles[jIdx];
    const aIdx = rodA.a === jIdx ? rodA.b : rodA.a;
    const bIdx = rodB.a === jIdx ? rodB.b : rodB.a;
    const A = state.particles[aIdx], B = state.particles[bIdx];
    let ang = Math.atan2(B.y - J.y, B.x - J.x) - Math.atan2(A.y - J.y, A.x - J.x);
    while (ang > Math.PI) ang -= 2 * Math.PI;
    while (ang < -Math.PI) ang += 2 * Math.PI;
    return ang;
  }
  function updateProps() {
    const box = document.getElementById('props');
    const title = document.getElementById('propTitle');
    if (!state.selected) {
      title.textContent = 'プロパティ';
      box.innerHTML = '<div style="color:#666;font-size:12px">オブジェクトを選択してください</div>';
      return;
    }
    if (state.selected.type === 'rod') {
      title.textContent = 'ロッド';
      const rod = state.rods[state.selected.index];
      box.innerHTML = nameRow(rod) + `
        <div class="row"><label>長さ</label><input type="number" id="rodLen" value="${rod.length.toFixed(1)}" step="1" min="1"></div>
        <div class="row"><input type="range" id="rodLenR" min="5" max="800" step="1" value="${Math.min(800, Math.max(5, rod.length)).toFixed(0)}"></div>
        <div class="row" style="color:#888;font-size:11px">端点: ${state.particles[rod.a].name} ⇄ ${state.particles[rod.b].name}</div>
      `;
      bindName(rod);
      const lenEl = document.getElementById('rodLen'), rngEl = document.getElementById('rodLenR');
      const sync = (v, from) => {
        rod.length = Math.max(1, v);
        if (from !== 'num') lenEl.value = rod.length.toFixed(1);
        if (from !== 'rng') rngEl.value = Math.min(800, Math.max(5, rod.length));
        renderList();
      };
      lenEl.addEventListener('input', e => sync(+e.target.value, 'num'));
      rngEl.addEventListener('input', e => sync(+e.target.value, 'rng'));
    } else if (state.selected.type === 'motor') {
      title.textContent = '回転ジョイント';
      const m = state.motors[state.selected.index];
      const degPerSec = radPerStepToDegPerSec(m.omega);
      const rpm = m.omega * FPS * 60 / (2 * Math.PI);
      box.innerHTML = nameRow(m) + `
        <div class="row"><label>回転速度 (°/秒)</label><input type="number" id="motSpd" value="${degPerSec.toFixed(1)}" step="5"></div>
        <div class="row"><input type="range" id="motSpdR" min="-720" max="720" step="1" value="${Math.round(degPerSec)}"></div>
        <div class="row" style="color:#888;font-size:11px"><span id="rpmLabel">≒ ${rpm.toFixed(2)} RPM</span></div>
        <div class="row"><label>腕の長さ</label><input type="number" id="motR" value="${m.radius.toFixed(1)}" step="1" min="1"></div>
        <div class="row"><input type="range" id="motRR" min="5" max="400" step="1" value="${Math.min(400, Math.max(5, m.radius)).toFixed(0)}"></div>
        <div class="row" style="color:#888;font-size:11px">中心: ${state.particles[m.center].name} / 駆動: ${state.particles[m.driven].name}</div>
      `;
      bindName(m);
      const spdEl = document.getElementById('motSpd'), spdR = document.getElementById('motSpdR');
      const rpmLbl = document.getElementById('rpmLabel');
      const syncSpd = (v, from) => {
        m.omega = degPerSecToRadPerStep(v);
        if (from !== 'num') spdEl.value = v.toFixed(1);
        if (from !== 'rng') spdR.value = Math.max(-720, Math.min(720, Math.round(v)));
        rpmLbl.textContent = `≒ ${(m.omega * FPS * 60 / (2 * Math.PI)).toFixed(2)} RPM`;
        renderList();
      };
      spdEl.addEventListener('input', e => syncSpd(+e.target.value, 'num'));
      spdR.addEventListener('input', e => syncSpd(+e.target.value, 'rng'));
      const rEl = document.getElementById('motR'), rR = document.getElementById('motRR');
      const syncR = (v, from) => {
        m.radius = Math.max(1, v);
        const rod = state.rods.find(r => (r.a === m.center && r.b === m.driven) || (r.a === m.driven && r.b === m.center));
        if (rod) rod.length = m.radius;
        if (from !== 'num') rEl.value = m.radius.toFixed(1);
        if (from !== 'rng') rR.value = Math.min(400, Math.max(5, m.radius));
        renderList();
      };
      rEl.addEventListener('input', e => syncR(+e.target.value, 'num'));
      rR.addEventListener('input', e => syncR(+e.target.value, 'rng'));
    } else if (state.selected.type === 'slider') {
      title.textContent = 'スライダー';
      const s = state.sliders[state.selected.index];
      const a = state.particles[s.a], b = state.particles[s.b], p = state.particles[s.particle];
      const rail = Math.hypot(b.x - a.x, b.y - a.y);
      box.innerHTML = nameRow(s) + `
        <div class="row"><label>駆動点</label><button id="selP" style="flex:1">${p.name}</button></div>
        <div class="row"><label>端A (上端)</label><button id="selA" style="flex:1">${a.name}</button></div>
        <div class="row"><label>端B (下端)</label><button id="selB" style="flex:1">${b.name}</button></div>
        <div class="row"><label>レール長</label><span class="num" style="color:#ddd;width:auto">${rail.toFixed(1)}</span></div>
      `;
      bindName(s);
      document.getElementById('selP').addEventListener('click', () => { state.selected = { type: 'particle', index: s.particle }; updateProps(); renderList(); });
      document.getElementById('selA').addEventListener('click', () => { state.selected = { type: 'particle', index: s.a }; updateProps(); renderList(); });
      document.getElementById('selB').addEventListener('click', () => { state.selected = { type: 'particle', index: s.b }; updateProps(); renderList(); });
    } else if (state.selected.type === 'coincidence') {
      title.textContent = '一致拘束';
      const cc = state.coincidences[state.selected.index];
      const a = state.particles[cc.a], b = state.particles[cc.b];
      box.innerHTML = nameRow(cc) + `
        <div class="row"><label>点A</label><button id="selCA" style="flex:1">${a.name}</button></div>
        <div class="row"><label>点B</label><button id="selCB" style="flex:1">${b.name}</button></div>
        <div style="font-size:11px;color:#888;margin-top:4px">2点の位置を一致させ続けます。片方は固定/駆動/スライダーに属していても構いません（片方は自由点が必要）。</div>
      `;
      bindName(cc);
      document.getElementById('selCA').addEventListener('click', () => { state.selected = { type: 'particle', index: cc.a }; updateProps(); renderList(); });
      document.getElementById('selCB').addEventListener('click', () => { state.selected = { type: 'particle', index: cc.b }; updateProps(); renderList(); });
    } else if (state.selected.type === 'angle') {
      title.textContent = '角度拘束';
      const ac = state.angleConstraints[state.selected.index];
      const deg = ac.angle * 180 / Math.PI;
      const rodA = state.rods[ac.rodA], rodB = state.rods[ac.rodB];
      box.innerHTML = nameRow(ac) + `
        <div class="row"><label>ジョイント</label><button id="selJ" style="flex:1">${state.particles[ac.joint].name}</button></div>
        <div class="row"><label>ロッドA</label><button id="selRA" style="flex:1">${rodA ? rodA.name : '—'}</button></div>
        <div class="row"><label>ロッドB</label><button id="selRB" style="flex:1">${rodB ? rodB.name : '—'}</button></div>
        <div class="row"><label>角度 (°)</label><input type="number" id="acDeg" value="${deg.toFixed(1)}" step="1"></div>
        <div class="row"><input type="range" id="acDegR" min="-180" max="180" step="1" value="${Math.round(deg)}"></div>
        <div class="row">
          <button class="preset" data-d="45">45°</button>
          <button class="preset" data-d="90">90°</button>
          <button class="preset" data-d="-90">-90°</button>
          <button class="preset" data-d="135">135°</button>
          <button class="preset" data-d="180">180°</button>
        </div>
        <div class="row"><button id="acCurBtn">現在の角度で固定</button></div>
      `;
      bindName(ac);
      const degEl = document.getElementById('acDeg'), degR = document.getElementById('acDegR');
      const syncAc = (v, from) => {
        let vv = ((v + 180) % 360 + 360) % 360 - 180;
        ac.angle = vv * Math.PI / 180;
        if (from !== 'num') degEl.value = vv.toFixed(1);
        if (from !== 'rng') degR.value = Math.round(vv);
        renderList();
      };
      degEl.addEventListener('input', e => syncAc(+e.target.value, 'num'));
      degR.addEventListener('input', e => syncAc(+e.target.value, 'rng'));
      box.querySelectorAll('.preset').forEach(b => b.addEventListener('click', () => syncAc(+b.dataset.d, 'pre')));
      document.getElementById('acCurBtn').addEventListener('click', () => {
        const cur = currentAngleBetween(ac.joint, ac.rodA, ac.rodB);
        syncAc(cur * 180 / Math.PI, 'pre');
      });
      document.getElementById('selJ').addEventListener('click', () => { state.selected = { type: 'particle', index: ac.joint }; updateProps(); renderList(); });
      document.getElementById('selRA').addEventListener('click', () => { state.selected = { type: 'rod', index: ac.rodA }; updateProps(); renderList(); });
      document.getElementById('selRB').addEventListener('click', () => { state.selected = { type: 'rod', index: ac.rodB }; updateProps(); renderList(); });
    } else {
      title.textContent = '点';
      const idx = state.selected.index;
      const p = state.particles[idx];
      const partOfSlider = state.sliders.filter(s => s.a === idx || s.b === idx || s.particle === idx);
      const motorRole = state.motors.find(m => m.center === idx) ? '回転中心' : state.motors.find(m => m.driven === idx) ? '駆動点' : null;
      const jointRods = rodsThrough(idx);
      const existingACs = state.angleConstraints.filter(ac => ac.joint === idx);
      const relX = (p.x - state.originX).toFixed(1);
      const relY = (state.originY - p.y).toFixed(1);
      let html = nameRow(p) + `
        <div class="row"><label>X</label><input type="number" id="pX" value="${p.x.toFixed(1)}" step="1"></div>
        <div class="row"><label>Y</label><input type="number" id="pY" value="${p.y.toFixed(1)}" step="1"></div>
        <div class="row" style="color:#888;font-size:11px">原点基準: (${relX}, ${relY})</div>
        <div class="row"><label>固定(ピン)</label><input type="checkbox" id="pPin" ${p.pinned ? 'checked' : ''} ${p.driven ? 'disabled' : ''}></div>
        ${motorRole ? `<div style="color:#ffd166;font-size:11px">役割: ${motorRole}</div>` : ''}
        ${partOfSlider.length ? `<div style="color:#7acef0;font-size:11px">所属スライダー: ${partOfSlider.map(s => s.name).join(', ')}</div>` : ''}
      `;
      if (jointRods.length >= 2) {
        const options = jointRods.map(ri => `<option value="${ri}">${state.rods[ri].name}</option>`).join('');
        html += `
          <div class="subbox">
            <h5>角度拘束</h5>
            ${existingACs.length ? `<div style="font-size:11px;color:#c9a0dc;margin-bottom:6px">既存: ${existingACs.map(a => a.name).join(', ')}</div>` : ''}
            <div class="row"><label>ロッドA</label><select id="acRodA">${options}</select></div>
            <div class="row"><label>ロッドB</label><select id="acRodB">${options}</select></div>
            <div class="row"><label>角度 (°)</label><input type="number" id="acNewDeg" value="90" step="1"></div>
            <div class="row">
              <button class="preset" data-d="90">90°</button>
              <button class="preset" data-d="180">180°</button>
              <button class="preset" data-d="45">45°</button>
              <button id="acNewCur">現在角</button>
            </div>
            <div class="row"><button id="acCreateBtn" class="primary" style="flex:1">作成</button></div>
          </div>
        `;
      }
      box.innerHTML = html;
      bindName(p);
      document.getElementById('pX').addEventListener('input', e => { p.x = +e.target.value; p.px = p.x; });
      document.getElementById('pY').addEventListener('input', e => { p.y = +e.target.value; p.py = p.y; });
      document.getElementById('pPin').addEventListener('change', e => { p.pinned = e.target.checked; p.px = p.x; p.py = p.y; renderList(); });
      if (jointRods.length >= 2) {
        const sA = document.getElementById('acRodA'), sB = document.getElementById('acRodB');
        if (jointRods.length >= 2) { sA.value = jointRods[0]; sB.value = jointRods[1]; }
        const degInp = document.getElementById('acNewDeg');
        box.querySelectorAll('.preset').forEach(b => b.addEventListener('click', () => { degInp.value = b.dataset.d; }));
        document.getElementById('acNewCur').addEventListener('click', () => {
          const cur = currentAngleBetween(idx, +sA.value, +sB.value);
          degInp.value = (cur * 180 / Math.PI).toFixed(1);
        });
        document.getElementById('acCreateBtn').addEventListener('click', () => {
          const rA = +sA.value, rB = +sB.value;
          if (rA === rB) { alert('異なるロッドを選んでください'); return; }
          const rodA = state.rods[rA], rodB = state.rods[rB];
          if (rodA.a !== idx && rodA.b !== idx) { alert('ロッドAがこのジョイントに接続していません'); return; }
          if (rodB.a !== idx && rodB.b !== idx) { alert('ロッドBがこのジョイントに接続していません'); return; }
          const ang = +degInp.value * Math.PI / 180;
          state.angleConstraints.push({ name: `A${++state.counters.a}`, joint: idx, rodA: rA, rodB: rB, angle: ang });
          renderList();
          state.selected = { type: 'angle', index: state.angleConstraints.length - 1 };
          updateProps();
        });
      }
    }
  }

  // ========= SAVE / LOAD =========
  document.getElementById('saveBtn').addEventListener('click', () => {
    localStorage.setItem('physics_save', JSON.stringify({
      particles: state.particles, rods: state.rods, motors: state.motors, sliders: state.sliders,
      angleConstraints: state.angleConstraints, coincidences: state.coincidences, counters: state.counters,
      originX: state.originX, originY: state.originY, gridSize: state.gridSize,
    }));
    alert('保存しました');
  });
  document.getElementById('loadBtn').addEventListener('click', () => {
    const s = localStorage.getItem('physics_save');
    if (!s) { alert('保存データがありません'); return; }
    try {
      const d = JSON.parse(s);
      state.particles = d.particles.map(p => ({ ...p, px: p.x, py: p.y, driven: p.driven || false }));
      state.rods = d.rods;
      state.motors = d.motors || [];
      state.sliders = d.sliders || [];
      state.angleConstraints = d.angleConstraints || [];
      state.coincidences = d.coincidences || [];
      state.counters = d.counters || { p: state.particles.length, r: state.rods.length, m: state.motors.length, s: state.sliders.length, a: state.angleConstraints.length, c: state.coincidences.length };
      if (d.originX != null) state.originX = d.originX;
      if (d.originY != null) state.originY = d.originY;
      if (d.gridSize) { state.gridSize = d.gridSize; document.getElementById('gridSize').value = d.gridSize; }
      state.selected = null; state.pending = null;
      updateProps(); renderList();
    } catch (err) { alert('読込失敗: ' + err.message); }
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('全削除しますか？')) return;
    state.particles = []; state.rods = []; state.motors = []; state.sliders = []; state.angleConstraints = []; state.coincidences = [];
    state.counters = { p: 0, r: 0, m: 0, s: 0, a: 0, c: 0 };
    state.selected = null; state.pending = null;
    updateProps(); renderList();
  });

  function redirectParticle(fromIdx, toIdx) {
    state.rods.forEach(r => { if (r.a === fromIdx) r.a = toIdx; if (r.b === fromIdx) r.b = toIdx; });
    state.motors.forEach(m => { if (m.center === fromIdx) m.center = toIdx; if (m.driven === fromIdx) m.driven = toIdx; });
    state.sliders.forEach(s => { if (s.particle === fromIdx) s.particle = toIdx; if (s.a === fromIdx) s.a = toIdx; if (s.b === fromIdx) s.b = toIdx; });
    state.angleConstraints.forEach(ac => { if (ac.joint === fromIdx) ac.joint = toIdx; });
    state.coincidences.forEach(c => { if (c.a === fromIdx) c.a = toIdx; if (c.b === fromIdx) c.b = toIdx; });
    // Remove degenerate rods (same endpoints) — deleteRod handles angle-constraint cascade
    for (let ri = state.rods.length - 1; ri >= 0; ri--) if (state.rods[ri].a === state.rods[ri].b) deleteRod(ri);
    state.motors = state.motors.filter(m => m.center !== m.driven);
    state.sliders = state.sliders.filter(s => s.particle !== s.a && s.particle !== s.b && s.a !== s.b);
    state.coincidences = state.coincidences.filter(c => c.a !== c.b);
  }
  function mergeOverlappingParticles(eps = MERGE_EPS) {
    let merged = 0, changed = true;
    while (changed) {
      changed = false;
      outer:
      for (let i = 0; i < state.particles.length; i++) {
        for (let j = i + 1; j < state.particles.length; j++) {
          const pi = state.particles[i], pj = state.particles[j];
          if (Math.hypot(pi.x - pj.x, pi.y - pj.y) < eps) {
            if (pj.pinned) pi.pinned = true;
            if (pj.driven) pi.driven = true;
            redirectParticle(j, i);
            deleteParticle(j);
            merged++; changed = true;
            break outer;
          }
        }
      }
    }
    return merged;
  }
  document.getElementById('mergeBtn').addEventListener('click', () => {
    const n = mergeOverlappingParticles(8);
    state.selected = null;
    updateProps(); renderList();
    alert(n === 0 ? '重複点はありませんでした' : `${n}件の重複点を統合しました`);
  });

  // ========= INIT =========
  resize();
  state.originX = Math.round(W / 2 / state.gridSize) * state.gridSize;
  state.originY = Math.round(H / 2 / state.gridSize) * state.gridSize;
  // Demo: slider-crank
  const cx = state.originX - 200, cy = state.originY;
  const center = addParticle(cx, cy, true);
  state.particles[center].name = 'Crank中心';
  const crankR = 80;
  const crankEnd = addParticle(cx + crankR, cy);
  state.particles[crankEnd].name = 'Crank先端';
  state.particles[crankEnd].driven = true;
  state.motors.push({ name: 'メインモーター', center, driven: crankEnd, radius: crankR, angle: 0, omega: 0.03 });
  state.rods.push({ name: 'クランク', a: center, b: crankEnd, length: crankR });
  state.counters.m = 1;
  const pistonX = cx + 320;
  const piston = addParticle(pistonX, cy);
  state.particles[piston].name = 'ピストン';
  const railA = addParticle(cx + 160, cy, true);
  state.particles[railA].name = 'レール上端';
  const railB = addParticle(cx + 520, cy, true);
  state.particles[railB].name = 'レール下端';
  state.sliders.push({ name: 'ピストンレール', particle: piston, a: railA, b: railB });
  state.counters.s = 1;
  state.rods.push({ name: 'コンロッド', a: crankEnd, b: piston, length: Math.hypot(pistonX - (cx + crankR), 0) });
  state.counters.r = 2;

  renderList();
  loop();
})();
</script>
</body>
</html>
